name: pr-gates

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "11 3 * * 1"

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-gates-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  design-artifact-gate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate PR design gate
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: python3 scripts/validate_pr_design_gate.py --base "${{ github.event.pull_request.base.sha }}" --head "${{ github.sha }}"

  validate-harness:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.13.0"

      - name: Install repository hooks
        run: ./scripts/install_git_hooks.sh

      - name: Validate Maestro selectors
        run: python3 scripts/validate_maestro_selectors.py

      - name: Test Harness runner
        run: python3 scripts/test_validate_harness_runner.py

      - name: Test local quality-gate runner
        run: python3 scripts/test_run_local_gates.py

      - name: Test Harness module boundaries
        run: python3 scripts/test_harness_module_boundaries.py

      - name: Test design metadata scanner isolation
        run: node --test scripts/test_check_design_metadata_leaks.mjs

      - name: Test formal approval scope classifier
        run: node --test scripts/test_classify_formal_approval_scope.mjs

      - name: Validate harness contract
        run: python3 scripts/validate_harness.py --skip-remote-guard

      - name: Validate launch readiness governance
        run: |
          node --test scripts/test_validate_launch_readiness.mjs
          node scripts/validate_launch_readiness.mjs

  agent-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Read current pull request body
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: gh api "repos/$GH_REPO/pulls/$PR_NUMBER" --jq .body > "$RUNNER_TEMP/pr-body.md"

      - name: Validate agent review record
        run: python3 scripts/validate_agent_review.py --body-file "$RUNNER_TEMP/pr-body.md"

  mobile-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.13.0"
          cache: "npm"
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint mobile app
        run: npm run lint -- --quiet

      - name: Scan for metadata leak in visible mobile UI text
        run: npm run metadata-leak-scan

      - name: Scan for metadata leak in design visual artifacts
        run: npm run design-metadata-leak-scan

      - name: Type-check mobile app
        run: npm run typecheck

      - name: Run mobile tests
        run: npm test -- --runInBand --watchAll=false

  backend-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: infra/cloudbase/functions/softbook-api
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.13.0"
          cache: "npm"
          cache-dependency-path: infra/cloudbase/functions/softbook-api/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Run backend contract tests
        run: npm test

  dependency-security:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.13.0"

      - name: Test dependency policies
        run: |
          node scripts/test_validate_dependency_security.mjs
          node scripts/test_normalize_react_native_podspecs.mjs

      - name: Validate dependency security
        run: node scripts/validate_dependency_security.mjs

  ios-release:
    runs-on: macos-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.13.0"
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Set up Ruby
        uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1
        with:
          ruby-version: "3.3"
          bundler: "Gemfile.lock"
          working-directory: apps/mobile

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Install Ruby dependencies
        env:
          BUNDLE_JOBS: "4"
          BUNDLE_RETRY: "3"
        run: bundle install

      - name: Install native build tools
        run: brew install cmake

      - name: Verify CocoaPods lock
        run: bundle exec pod install --project-directory=ios --deployment

      - name: Build Release simulator app
        run: >-
          xcodebuild
          -workspace ios/SoftbookCET.xcworkspace
          -scheme SoftbookCET
          -configuration Release
          -sdk iphonesimulator
          -destination 'generic/platform=iOS Simulator'
          -derivedDataPath "$RUNNER_TEMP/softbook-simulator-derived"
          CODE_SIGNING_ALLOWED=NO
          CODE_SIGNING_REQUIRED=NO
          build

      - name: Create unsigned Release archive
        run: >-
          xcodebuild
          -workspace ios/SoftbookCET.xcworkspace
          -scheme SoftbookCET
          -configuration Release
          -destination 'generic/platform=iOS'
          -archivePath "$RUNNER_TEMP/SoftbookCET.xcarchive"
          -derivedDataPath "$RUNNER_TEMP/softbook-device-derived"
          CODE_SIGNING_ALLOWED=NO
          CODE_SIGNING_REQUIRED=NO
          archive

  repo-health:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          lfs: true

      - name: Test repository health validator
        run: node scripts/test_report_repo_health.mjs

      - name: Reject untrusted remote health ref
        if: >-
          (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') &&
          github.ref != 'refs/heads/main'
        run: |
          echo "::error title=Untrusted remote health ref::Remote repository health may run only from refs/heads/main."
          exit 1

      - name: Validate trusted remote repository health
        if: >-
          (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') &&
          github.ref == 'refs/heads/main'
        env:
          REPO_HEALTH_TOKEN: ${{ secrets.REPO_HEALTH_TOKEN }}
        run: |
          if [ -z "$REPO_HEALTH_TOKEN" ]; then
            echo "::error title=Repository health credential missing::REPO_HEALTH_TOKEN must be a repository-scoped fine-grained token with Administration read and Actions read."
            exit 1
          fi
          GH_TOKEN="$REPO_HEALTH_TOKEN" node scripts/report_repo_health.mjs --full-tree --remote --strict --expected-max-worktrees 1 --expected-max-stashes 0 --expected-max-topic-branches 1 --require-upstreams --output "$RUNNER_TEMP/repository-health.json"

      - name: Validate changed repository health
        if: github.event_name != 'schedule' && github.event_name != 'workflow_dispatch'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          if git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            node scripts/report_repo_health.mjs --base "$BASE_SHA" --strict --expected-max-worktrees 1 --expected-max-stashes 0 --expected-max-topic-branches 1 --require-upstreams --output "$RUNNER_TEMP/repository-health.json"
          else
            node scripts/report_repo_health.mjs --strict --expected-max-worktrees 1 --expected-max-stashes 0 --expected-max-topic-branches 1 --require-upstreams --output "$RUNNER_TEMP/repository-health.json"
          fi

  evidence-archive:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Test agent run evidence validator
        run: node --test scripts/test_validate_agent_run_evidence.mjs

      - name: Validate agent run evidence manifests
        run: node scripts/validate_agent_run_evidence.mjs --verify-remote
