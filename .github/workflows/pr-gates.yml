name: pr-gates

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-harness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install repository hooks
        run: ./scripts/install_git_hooks.sh

      - name: Validate harness contract
        run: python3 scripts/validate_harness.py --skip-remote-guard

  mobile-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.11.0"
          cache: "npm"
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint mobile app
        run: npm run lint -- --quiet

      - name: Type-check mobile app
        run: npm run typecheck

      - name: Run mobile tests
        run: npm test -- --runInBand --watchAll=false
