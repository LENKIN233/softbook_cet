appId: com.softbook.cet
name: ios-mine-code-sent-screenshot
---
- clearState
- launchApp
- extendedWaitUntil:
    visible:
      id: 'auth-phone-input'
    timeout: 30000
- tapOn:
    id: 'route-tab-mine'
- assertVisible:
    id: 'auth-phone-input'
- tapOn:
    id: 'auth-phone-input'
- inputText: '13800138000'
- tapOn:
    id: 'mine-profile-card'
- assertVisible:
    id: 'auth-request-code-button'
- tapOn:
    id: 'auth-request-code-button'
- assertVisible:
    id: 'auth-code-sent-title'
- assertVisible:
    id: 'auth-code-input'
- assertVisible:
    id: 'auth-submit-button'
