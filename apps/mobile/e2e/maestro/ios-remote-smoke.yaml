appId: com.softbook.cet
name: ios-remote-auth-learning-space-statistics-smoke
---
- extendedWaitUntil:
    visible:
      id: "auth-phone-input"
    timeout: 30000
- tapOn:
    id: "auth-phone-input"
- inputText: "${SOFTBOOK_CET_MAESTRO_PHONE}"
- tapOn:
    id: "auth-dismiss-keyboard-button"
- scrollUntilVisible:
    element:
      id: "auth-request-code-button"
    direction: DOWN
- tapOn:
    id: "auth-request-code-button"
- assertVisible:
    id: "auth-code-input"
- tapOn:
    id: "auth-code-input"
- inputText: "${SOFTBOOK_CET_MAESTRO_CODE}"
- tapOn:
    id: "auth-gate-keyboard-dismiss-target"
- scrollUntilVisible:
    element:
      id: "auth-submit-button"
    direction: DOWN
- tapOn:
    id: "auth-submit-button"
- tapOn:
    id: "route-tab-learning"
- assertVisible:
    id: "learning-current-card"

- tapOn:
    id: "route-tab-space"
- assertVisible:
    id: "space-address-shelf"
- scrollUntilVisible:
    element:
      id: "space-library-2"
    direction: DOWN
    centerElement: true
- tapOn:
    id: "space-library-2"
- scrollUntilVisible:
    element:
      id: "space-group-1"
    direction: DOWN
    centerElement: true
- tapOn:
    id: "space-group-1"
- scrollUntilVisible:
    element:
      id: "space-box-0521"
    direction: DOWN
    centerElement: true
- tapOn:
    id: "space-box-0521"
- scrollUntilVisible:
    element:
      id: "space-favorite-052101"
    direction: DOWN
    centerElement: true
- tapOn:
    id: "space-favorite-052101"
- assertVisible: "取消收藏"
- scrollUntilVisible:
    element:
      id: "space-sleep-052101"
    direction: DOWN
    centerElement: true
- tapOn:
    id: "space-sleep-052101"
- scrollUntilVisible:
    element:
      id: "space-wake-052101"
    direction: UP
    centerElement: true
- assertVisible:
    id: "space-wake-052101"
- tapOn:
    id: "space-wake-052101"
- tapOn:
    id: "route-tab-learning"
- assertVisible:
    id: "learning-current-card"

- scrollUntilVisible:
    element:
      id: "learning-flip-button"
    direction: DOWN
    centerElement: true
- tapOn:
    id: "learning-flip-button"
- scrollUntilVisible:
    element:
      id: "learning-flip-confident-button"
    direction: DOWN
    centerElement: true
- tapOn:
    id: "learning-flip-confident-button"
- scrollUntilVisible:
    element:
      id: "learning-next-button"
    direction: DOWN
    centerElement: true
- tapOn:
    id: "learning-next-button"

- scrollUntilVisible:
    element:
      id: "learning-option-unclear"
    direction: DOWN
    centerElement: true
- tapOn:
    id: "learning-option-unclear"
- scrollUntilVisible:
    element:
      id: "learning-submit-button"
    direction: DOWN
    centerElement: true
- tapOn:
    id: "learning-submit-button"
- scrollUntilVisible:
    element:
      id: "learning-next-button"
    direction: DOWN
    centerElement: true
- tapOn:
    id: "learning-next-button"

- scrollUntilVisible:
    element:
      id: "learning-lock-subject-the-policy"
    direction: DOWN
    centerElement: true
- tapOn:
    id: "learning-lock-subject-the-policy"
- tapOn:
    id: "learning-lock-verb-reduces"
- tapOn:
    id: "learning-lock-object-test-anxiety"
- scrollUntilVisible:
    element:
      id: "learning-submit-button"
    direction: DOWN
    centerElement: true
- tapOn:
    id: "learning-submit-button"
- scrollUntilVisible:
    element:
      id: "learning-next-button"
    direction: DOWN
    centerElement: true
- tapOn:
    id: "learning-next-button"

- scrollUntilVisible:
    element:
      id: "learning-elimination-relative_clause"
    direction: DOWN
    centerElement: true
- tapOn:
    id: "learning-elimination-relative_clause"
- tapOn:
    id: "learning-elimination-adverb"
- tapOn:
    id: "learning-elimination-time_phrase"
- scrollUntilVisible:
    element:
      id: "learning-submit-button"
    direction: DOWN
    centerElement: true
- tapOn:
    id: "learning-submit-button"
- scrollUntilVisible:
    element:
      id: "learning-next-button"
    direction: DOWN
    centerElement: true
- tapOn:
    id: "learning-next-button"

- scrollUntilVisible:
    element:
      id: "learning-swipe-safe"
    direction: DOWN
    centerElement: true
- tapOn:
    id: "learning-swipe-safe"
- scrollUntilVisible:
    element:
      id: "learning-submit-button"
    direction: DOWN
    centerElement: true
- tapOn:
    id: "learning-submit-button"
- scrollUntilVisible:
    element:
      id: "learning-next-button"
    direction: DOWN
    centerElement: true
- tapOn:
    id: "learning-next-button"
- assertVisible:
    id: "learning-complete-details"

- tapOn:
    id: "route-tab-statistics"
- assertVisible:
    id: "statistics-metric-completed"
- assertVisible:
    id: "statistics-checkin-button"
- tapOn:
    id: "statistics-checkin-button"
- assertVisible: "今日已签到"
