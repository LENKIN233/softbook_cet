appId: com.softbook.cet
name: ios-auth-learning-space-statistics-smoke
---
- clearState
- launchApp
- assertVisible:
    id: "auth-phone-input"
- tapOn:
    id: "auth-phone-input"
- inputText: "13800138000"
- hideKeyboard
- tapOn:
    id: "auth-request-code-button"
- assertVisible:
    id: "auth-code-input"
- tapOn:
    id: "auth-code-input"
- inputText: "2468"
- hideKeyboard
- tapOn:
    id: "auth-submit-button"
- assertVisible:
    id: "learning-current-card"

- tapOn:
    id: "route-tab-space"
- assertVisible:
    id: "space-current-position"
- tapOn:
    id: "route-tab-learning"
- assertVisible:
    id: "learning-current-card"

- scrollUntilVisible:
    element:
      id: "learning-flip-button"
    direction: DOWN
- tapOn:
    id: "learning-flip-button"
- scrollUntilVisible:
    element:
      id: "learning-flip-confident-button"
    direction: DOWN
- tapOn:
    id: "learning-flip-confident-button"
- tapOn:
    id: "learning-next-button"
- scrollUntilVisible:
    element:
      id: "learning-current-card"
    direction: UP

- scrollUntilVisible:
    element:
      id: "learning-option-unclear"
    direction: DOWN
- tapOn:
    id: "learning-option-unclear"
- tapOn:
    id: "learning-submit-button"
- tapOn:
    id: "learning-next-button"
- scrollUntilVisible:
    element:
      id: "learning-current-card"
    direction: UP

- scrollUntilVisible:
    element:
      id: "learning-lock-subject-the-policy"
    direction: DOWN
- tapOn:
    id: "learning-lock-subject-the-policy"
- tapOn:
    id: "learning-lock-verb-reduces"
- tapOn:
    id: "learning-lock-object-test-anxiety"
- tapOn:
    id: "learning-submit-button"
- tapOn:
    id: "learning-next-button"
- scrollUntilVisible:
    element:
      id: "learning-current-card"
    direction: UP

- scrollUntilVisible:
    element:
      id: "learning-elimination-relative_clause"
    direction: DOWN
- tapOn:
    id: "learning-elimination-relative_clause"
- tapOn:
    id: "learning-elimination-adverb"
- tapOn:
    id: "learning-elimination-time_phrase"
- tapOn:
    id: "learning-submit-button"
- tapOn:
    id: "learning-next-button"
- scrollUntilVisible:
    element:
      id: "learning-current-card"
    direction: UP

- scrollUntilVisible:
    element:
      id: "learning-swipe-safe"
    direction: DOWN
- tapOn:
    id: "learning-swipe-safe"
- tapOn:
    id: "learning-submit-button"
- tapOn:
    id: "learning-next-button"
- assertVisible:
    id: "learning-complete-summary"

- tapOn:
    id: "route-tab-statistics"
- assertVisible:
    id: "statistics-metric-completed"
- assertVisible:
    id: "statistics-checkin-button"
- tapOn:
    id: "statistics-checkin-button"
- assertVisible: "今日已签到"
