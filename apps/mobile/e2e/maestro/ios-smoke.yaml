appId: com.softbook.cet
name: ios-auth-learning-space-statistics-smoke
---
- clearState
- launchApp
- extendedWaitUntil:
    visible:
      id: "auth-phone-input"
    timeout: 30000
- tapOn:
    id: "auth-phone-input"
- inputText: "13800138000"
- tapOn:
    id: "auth-dismiss-keyboard-button"
- scrollUntilVisible:
    element:
      id: "auth-request-code-button"
    direction: DOWN
- tapOn:
    id: "auth-request-code-button"
- assertVisible:
    id: "auth-code-input"
- tapOn:
    id: "auth-code-input"
- inputText: "2468"
- scrollUntilVisible:
    element:
      id: "auth-submit-button"
    direction: DOWN
- tapOn:
    id: "auth-submit-button"
- tapOn:
    point: "16%,91%"
- assertVisible:
    id: "learning-current-card"

- tapOn:
    point: "39%,91%"
- assertVisible:
    id: "space-current-position"
- tapOn:
    point: "16%,91%"
- assertVisible:
    id: "learning-current-card"

- scrollUntilVisible:
