appId: com.softbook.cet
name: ios-auth-statistics-gate-screenshot
---
- clearState
- launchApp
- extendedWaitUntil:
    visible:
      id: 'auth-phone-input'
    timeout: 30000
- tapOn:
    id: 'route-tab-statistics'
- assertVisible:
    id: 'auth-gate-title'
- assertVisible:
    id: 'auth-retained-object-title'
- assertVisible:
    id: 'auth-request-code-button'
