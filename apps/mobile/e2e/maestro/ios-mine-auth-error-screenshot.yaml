appId: com.softbook.cet
name: ios-mine-auth-error-screenshot
---
- extendedWaitUntil:
    visible:
      id: 'auth-phone-input'
    timeout: 30000
- tapOn:
    id: 'route-tab-mine'
- tapOn:
    id: 'auth-phone-input'
- inputText: '13800138000'
- tapOn:
    id: 'auth-gate-keyboard-dismiss-target'
- tapOn:
    id: 'auth-request-code-button'
- extendedWaitUntil:
    visible:
      id: 'auth-error-dock'
    timeout: 10000
- assertVisible:
    id: 'mine-profile-card'
- assertVisible:
    id: 'auth-error-title'
- assertVisible:
    id: 'auth-error-detail'
- assertVisible:
    id: 'auth-error-retry-pill'
