appId: com.softbook.cet
name: ios-mine-phone-ready-screenshot
---
- clearState
- launchApp
- extendedWaitUntil:
    visible:
      id: 'auth-phone-input'
    timeout: 30000
- tapOn:
    id: 'route-tab-mine'
- tapOn:
    id: 'auth-phone-input'
- inputText: '13800138000'
- tapOn:
    id: 'auth-gate-keyboard-dismiss-target'
- assertVisible:
    id: 'mine-profile-card'
- assertVisible:
    id: 'auth-request-readiness-pill'
- assertVisible:
    id: 'auth-request-code-button'
